# PRD §5 service set (issue #12). Secrets come from .env — see env.example.
services:
  postgres:
    image: postgres:14
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_forecasting}
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-ai_forecasting}"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Intelligence API: signals, model health, forecasts
  api:
    build: .
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-ai_forecasting}
      - REDIS_URL=redis://redis:6379/0
      - MODEL_REGISTRY_PATH=/app/models/registry
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./models:/app/models
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Live candle ingestion (websocket) with heartbeat monitoring
  ingestor:
    build: .
    command: python scripts/stream_klines.py --interval 4h
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-ai_forecasting}
      - HEALTHCHECKS_URL=${HEALTHCHECKS_URL:-}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # Execution engine (Freqtrade). Dry-run config by default; live requires
  # a separate reviewed config plus G0-G2 gate sign-off (PRD §8).
  freqtrade:
    image: freqtradeorg/freqtrade:stable
    command: trade --config /freqtrade/user_data/config.dry.json --strategy EnsembleSignalStrategy
    environment:
      - SIGNAL_API_URL=http://api:8000
      - FREQTRADE__TELEGRAM__ENABLED=${TELEGRAM_ENABLED:-false}
      - FREQTRADE__TELEGRAM__TOKEN=${TELEGRAM_TOKEN:-}
      - FREQTRADE__TELEGRAM__CHAT_ID=${TELEGRAM_CHAT_ID:-}
    volumes:
      - ./user_data:/freqtrade/user_data
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
